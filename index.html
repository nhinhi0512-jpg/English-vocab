<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Loại Từ Vựng THPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4a373; /* Nâu vàng pastel đậm cho chữ tiêu đề chính */
            --secondary-color: #ffb5a7; /* Hồng pastel ấm áp */
            --sgk-color: #fcd5ce; /* Hồng pastel nhạt cho từ SGK */
            --morong-color: #fec89a; /* Vàng cam pastel cho từ Mở rộng */
            --bg-color: #fffbf2; /* Nền vàng kem siêu nhạt, dịu mắt */
            --card-bg: #ffffff;
            --text-color: #4a4a4a;
            --border-radius: 16px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fcd5ce 0%, #fec89a 100%);
            padding: 30px 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(255, 181, 167, 0.2);
        }

        header h1 {
            color: #5c413c;
            margin: 0 0 5px 0;
            font-size: 28px;
        }

        header p {
            color: #6b514c;
            margin: 0;
            font-weight: 500;
        }

        /* Thanh tìm kiếm và bộ lọc của Học sinh */
        .filter-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(212, 163, 115, 0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid #f9eed6;
        }

        .search-box {
            flex: 2;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #fcd5ce;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
            background-color: #fffdf9;
        }

        .search-box input:focus {
            border-color: #ffb5a7;
            box-shadow: 0 0 8px rgba(255, 181, 167, 0.4);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4a373;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
        }

        .filter-select select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #fec89a;
            border-radius: 10px;
            font-size: 16px;
            background-color: white;
            cursor: pointer;
            outline: none;
            color: #5c413c;
        }

        .filter-select select:focus {
            border-color: #ffb5a7;
        }

        /* Bảng điều khiển tải lên dành cho Giáo viên */
        .admin-panel {
            background: #fff5e6;
            border: 2px dashed #ffdbb5;
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
        }

        .admin-panel h3 {
            margin-top: 0;
            color: #6b514c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .upload-zone {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ffe8cc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .upload-zone h4 {
            margin: 0 0 10px 0;
            color: #5c413c;
            border-bottom: 2px solid #fff0db;
            padding-bottom: 5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        .btn-upload {
            width: 100%;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border: 2px solid;
            background: white;
            transition: all 0.2s;
        }

        .btn-sgk { border-color: #ffb5a7; color: #e07a5f; background-color: #fff0ed; }
        .btn-sgk:hover { background: #ffb5a7; color: white; }

        .btn-morong { border-color: #fec89a; color: #d4a373; background-color: #fff8f0; }
        .btn-morong:hover { background: #fec89a; color: white; }

        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            cursor: pointer; height: 100%; width: 100%;
        }

        /* Danh sách hiển thị từ vựng */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .vocab-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 12px rgba(212, 163, 115, 0.08);
            position: relative;
            transition: all 0.2s;
            border: 1px solid #fff5e1;
        }

        .vocab-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 6px 18px rgba(255, 181, 167, 0.25);
        }

        .card-tags {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .tag-grade { background-color: #faedcd; color: #6c584c; }
        .tag-sgk { background-color: #fcd5ce; color: #9a5446; }
        .tag-morong { background-color: #fec89a; color: #7f4f24; }
        .tag-level { background-color: #ffb5a7; color: white; margin-left: auto;}

        .word-title {
            font-size: 24px;
            font-weight: bold;
            color: #5c413c;
            margin: 5px 0;
        }

        .word-ipa {
            color: #a3918f;
            font-style: italic;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .word-meaning {
            font-size: 16px;
            font-weight: 600;
            color: #4a332f;
            margin-bottom: 12px;
            border-left: 4px solid #ffb5a7;
            padding-left: 10px;
        }

        .word-example {
            background: #fffdf9;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px dashed #fcd5ce;
        }

        .word-example span {
            display: block;
            color: #7a6360;
            font-style: italic;
            margin-top: 5px;
        }

        .word-details summary {
            font-size: 14px;
            color: #d4a373;
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }

        .word-details summary:hover {
            color: #ffb5a7;
        }

        .details-content {
            margin-top: 10px;
            font-size: 13px;
            border-top: 1px solid #fff0ed;
            padding-top: 10px;
            background-color: #fffaf5;
            border-radius: 8px;
            padding: 10px;
        }

        .detail-item { margin-bottom: 8px; line-height: 1.4; }
        .detail-item strong { color: #82625a; }
