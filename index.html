<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Loại Từ Vựng THPT & TOEIC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4a373; /* Nâu vàng pastel đậm cho chữ tiêu đề chính */
            --secondary-color: #ffb5a7; /* Hồng pastel ấm áp */
            --sgk-color: #fcd5ce; /* Hồng pastel nhạt cho từ SGK */
            --morong-color: #fec89a; /* Vàng cam pastel cho từ Mở rộng */
            --toeic-color: #e8aeae; /* Màu hồng đất nhạt riêng cho nhãn TOEIC */
            --bg-color: #fffbf2; /* Nền vàng kem siêu nhạt, dịu mắt */
            --card-bg: #ffffff;
            --text-color: #4a4a4a;
            --border-radius: 16px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fcd5ce 0%, #fec89a 100%);
            padding: 30px 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(255, 181, 167, 0.2);
        }

        header h1 {
            color: #5c413c;
            margin: 0 0 5px 0;
            font-size: 28px;
        }

        header p {
            color: #6b514c;
            margin: 0;
            font-weight: 500;
        }

        /* Thanh tìm kiếm và bộ lọc của Học sinh */
        .filter-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(212, 163, 115, 0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid #f9eed6;
        }

        .search-box {
            flex: 2;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #fcd5ce;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
            background-color: #fffdf9;
        }

        .search-box input:focus {
            border-color: #ffb5a7;
            box-shadow: 0 0 8px rgba(255, 181, 167, 0.4);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4a373;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
        }

        .filter-select select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #fec89a;
            border-radius: 10px;
            font-size: 16px;
            background-color: white;
            cursor: pointer;
            outline: none;
            color: #5c413c;
        }

        .filter-select select:focus {
            border-color: #ffb5a7;
        }

        /* Bảng điều khiển tải lên dành cho Giáo viên */
        .admin-panel {
            background: #fff5e6;
            border: 2px dashed #ffdbb5;
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
        }

        .admin-panel h3 {
            margin-top: 0;
            color: #6b514c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        .upload-zone {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ffe8cc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .upload-zone h4 {
            margin: 0 0 10px 0;
            color: #5c413c;
            border-bottom: 2px solid #fff0db;
            padding-bottom: 5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        .btn-upload {
            width: 100%;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border: 2px solid;
            background: white;
            transition: all 0.2s;
        }

        .btn-sgk { border-color: #ffb5a7; color: #e07a5f; background-color: #fff0ed; }
        .btn-sgk:hover { background: #ffb5a7; color: white; }

        .btn-morong { border-color: #fec89a; color: #d4a373; background-color: #fff8f0; }
        .btn-morong:hover { background: #fec89a; color: white; }

        .btn-toeic { border-color: #e8aeae; color: #9c5c5c; background-color: #fff5f5; padding: 10px 0; }
        .btn-toeic:hover { background: #e8aeae; color: white; }

        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            cursor: pointer; height: 100%; width: 100%;
        }

        /* Danh sách hiển thị từ vựng */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .vocab-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 12px rgba(212, 163, 115, 0.08);
            position: relative;
            transition: all 0.2s;
            border: 1px solid #fff5e1;
        }

        .vocab-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 6px 18px rgba(255, 181, 167, 0.25);
        }

        .card-tags {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .tag-grade { background-color: #faedcd; color: #6c584c; }
        .tag-sgk { background-color: #fcd5ce; color: #9a5446; }
        .tag-morong { background-color: #fec89a; color: #7f4f24; }
        .tag-toeic { background-color: #e8aeae; color: #fff; }
        .tag-level { background-color: #ffb5a7; color: white; }

        .btn-delete-item {
            background: none;
            border: none;
            color: #e07a5f;
            cursor: pointer;
            margin-left: auto;
            font-size: 14px;
            padding: 0 5px;
            transition: color 0.2s;
        }

        .btn-delete-item:hover {
            color: #c94c2c;
        }

        .word-title {
            font-size: 24px;
            font-weight: bold;
            color: #5c413c;
            margin: 10px 0 5px 0;
        }

        .word-ipa {
            color: #a3918f;
            font-style: italic;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .word-meaning {
            font-size: 16px;
            font-weight: 600;
            color: #4a332f;
            margin-bottom: 12px;
            border-left: 4px solid #ffb5a7;
            padding-left: 10px;
        }

        .word-example {
            background: #fffdf9;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px dashed #fcd5ce;
        }

        .word-example span {
            display: block;
            color: #7a6360;
            font-style: italic;
            margin-top: 5px;
        }

        .word-details summary {
            font-size: 14px;
            color: #d4a373;
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }

        .word-details summary:hover {
            color: #ffb5a7;
        }

        .details-content {
            margin-top: 10px;
            font-size: 13px;
            border-top: 1px solid #fff0ed;
            padding-top: 10px;
            background-color: #fffaf5;
            border-radius: 8px;
            padding: 10px;
        }

        .detail-item { margin-bottom: 8px; line-height: 1.4; }
        .detail-item strong { color: #82625a; }

        .lesson-badge {
            display: inline-block;
            background: #fff3e3;
            color: #b57c4a;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 14px;
            font-weight: 500;
            border: 1px solid #ffeacc;
        }

        .no-result {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #b5928a;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-star"></i> Hệ Thống Quản Lý Từ Vựng THPT & TOEIC</h1>
        <p>Phân loại khoa học Lớp 10 - 11 - 12 & Chứng chỉ quốc tế • Thúc đẩy năng lực tiếng Anh</p>
    </header>

    <!-- KHU VỰC DÀNH CHO GIÁO VIÊN -->
    <div class="admin-panel">
        <h3><i class="fa-solid fa-heart"></i> Cập Nhật Từ Vựng (Dành Cho Giáo Viên)</h3>
        <div class="upload-grid">
            <!-- Khối 10 -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-feather"></i> Tải lên Lớp 10</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-sgk"><i class="fa-solid fa-book"></i> Từ SGK</button>
                        <input type="file" onchange="importVocab(this, '10', 'SGK')" accept=".json">
                    </div>
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-morong"><i class="fa-solid fa-sparkles"></i> Mở rộng</button>
                        <input type="file" onchange="importVocab(this, '10', 'Mở rộng')" accept=".json">
                    </div>
                </div>
            </div>
            <!-- Khối 11 -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-feather"></i> Tải lên Lớp 11</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-sgk"><i class="fa-solid fa-book"></i> Từ SGK</button>
                        <input type="file" onchange="importVocab(this, '11', 'SGK')" accept=".json">
                    </div>
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-morong"><i class="fa-solid fa-sparkles"></i> Mở rộng</button>
                        <input type="file" onchange="importVocab(this, '11', 'Mở rộng')" accept=".json">
                    </div>
                </div>
            </div>
            <!-- Khối 12 -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-feather"></i> Tải lên Lớp 12</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-sgk"><i class="fa-solid fa-book"></i> Từ SGK</button>
                        <input type="file" onchange="importVocab(this, '12', 'SGK')" accept=".json">
                    </div>
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-morong"><i class="fa-solid fa-sparkles"></i> Mở rộng</button>
                        <input type="file" onchange="importVocab(this, '12', 'Mở rộng')" accept=".json">
                    </div>
                </div>
            </div>
            <!-- TOEIC -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-graduation-cap"></i> TOEIC</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-toeic"><i class="fa-solid fa-cloud-arrow-up"></i> Tải lên từ vựng TOEIC</button>
                        <input type="file" onchange="importVocab(this, 'TOEIC', 'TOEIC')" accept=".json">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- THANH CÔNG CỤ TÌM KIẾM & BỘ LỌC CỦA HỌC SINH -->
    <div class="filter-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm từ vựng, ý nghĩa, ví dụ...">
            <i class="fa-solid fa-heart"></i>
        </div>

        <div class="filter-select">
            <select id="gradeFilter">
                <option value="all">✨ Tất cả các khóa</option>
                <option value="10">Lớp 10</option>
                <option value="11">Lớp 11</option>
                <option value="12">Lớp 12</option>
                <option value="TOEIC">🎯 Luyện thi TOEIC</option>
            </select>
        </div>

        <div class="filter-select">
            <select id="typeFilter">
                <option value="all">🌸 Tất cả loại từ</option>
                <option value="SGK">Từ vựng SGK</option>
                <option value="Mở rộng">Từ vựng mở rộng</option>
                <option value="TOEIC">Từ vựng TOEIC</option>
            </select>
        </div>

        <div class="filter-select">
            <select id="lessonFilter">
                <option value="all">📖 Tất cả bài học</option>
            </select>
        </div>
    </div>

    <!-- LƯỚI TỪ VỰNG -->
    <div class="vocab-grid" id="vocabGrid"></div>
</div>

<script>
    let vocabularyData = [];

    document.addEventListener("DOMContentLoaded", () => {
        const localData = localStorage.getItem('thptVocabulary');
        if (localData) {
            vocabularyData = JSON.parse(localData);
        }
        renderVocab(vocabularyData);
        updateLessonFilter();

        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('gradeFilter').addEventListener('change', filterData);
        document.getElementById('typeFilter').addEventListener('change', filterData);
        document.getElementById('lessonFilter').addEventListener('change', filterData);
    });

    function renderVocab(data) {
        const grid = document.getElementById('vocabGrid');
        grid.innerHTML = '';

        if(data.length === 0) {
            grid.innerHTML = `<div class="no-result"><i class="fa-regular fa-face-frown"></i> Chưa có dữ liệu từ vựng nào được hiển thị...</div>`;
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            
            let typeTagClass = 'tag-morong';
            if (item.type === 'SGK') typeTagClass = 'tag-sgk';
            if (item.type === 'TOEIC') typeTagClass = 'tag-toeic';

            const gradeLabel = item.grade === 'TOEIC' ? 'TOEIC' : `Lớp ${item.grade}`;

            card.innerHTML = `
                <div class="card-tags">
                    <span class="tag tag-grade">${gradeLabel}</span>
                    <span class="tag ${typeTagClass}">${item.type}</span>
                    <span class="tag tag-level">${item.level || 'B2'}</span>
                    
                    <!-- Nút xóa thủ công từng từ vựng -->
                    <button onclick="deleteWord('${item.word}', '${item.grade}')" class="btn-delete-item" title="Xóa từ vựng này">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                <h3 class="word-title">${item.word}</h3>
                <div class="word-ipa">${item.ipa || ''}</div>
                <div class="word-meaning">${item.meaning}</div>
                <div class="word-example">
                    <strong>Ex:</strong> ${item.example_en}
                    <span>${item.example_vi || ''}</span>
                </div>
                <details class="word-details">
                    <summary>Xem mở rộng (Word Map) ✨</summary>
                    <div class="details-content">
                        ${item.collocations ? `<div class="detail-item"><strong>Collocations:</strong> ${item.collocations}</div>` : ''}
                        ${item.word_family ? `<div class="detail-item"><strong>Word Family:</strong> ${item.word_family}</div>` : ''}
                        ${item.synonyms ? `<div class="detail-item"><strong>Synonyms:</strong> ${item.synonyms}</div>` : ''}
                        ${item.antonyms ? `<div class="detail-item"><strong>Antonyms:</strong> ${item.antonyms}</div>` : ''}
                    </div>
                </details>
                <div><span class="lesson-badge"><i class="fa-solid fa-heart"></i> ${item.lesson || 'General'}</span></div>
            `;
            grid.appendChild(card);
        });
    }

    function updateLessonFilter() {
        const filter = document.getElementById('lessonFilter');
        const lessons = [...new Set(vocabularyData.map(item => item.lesson || 'General'))].sort();
        filter.innerHTML = '<option value="all">📖 Tất cả bài học</option>';
        lessons.forEach(lesson => {
            const option = document.createElement('option');
            option.value = lesson; option.textContent = lesson;
            filter.appendChild(option);
        });
    }

    function filterData() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        const selectedGrade = document.getElementById('gradeFilter').value;
        const selectedType = document.getElementById('typeFilter').value;
        const documentLesson = document.getElementById('lessonFilter').value;

        const filtered = vocabularyData.filter(item => {
            const matchKeyword = item.word.toLowerCase().includes(keyword) || item.meaning.toLowerCase().includes(keyword);
            const matchGrade = (selectedGrade === 'all') || (item.grade === selectedGrade);
            const matchType = (selectedType === 'all') || (item.type === selectedType);
            const matchLesson = (documentLesson === 'all') || (item.lesson === documentLesson);

            return matchKeyword && matchGrade && matchType && matchLesson;
        });

        renderVocab(filtered);
    }

    // Tính năng nạp file kết hợp chống trùng lặp thông minh (Upsert)
    function importVocab(inputElement, grade, type) {
        const file = inputElement.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const newData = JSON.parse(e.target.result);
                if (Array.isArray(newData)) {
                    newData.forEach(item => {
                        item.grade = grade;
                        item.type = type;

                        // Đối chiếu chéo theo Tên Từ + Cấp Lớp để chống trùng lắp
                        const index = vocabularyData.findIndex(v => v.word.toLowerCase() === item.word.toLowerCase() && v.grade === grade);
                        if (index !== -1) {
                            vocabularyData[index] = item; // Ghi đè cập nhật
                        } else {
                            vocabularyData.push(item); // Thêm mới
                        }
                    });

                    localStorage.setItem('thptVocabulary', JSON.stringify(vocabularyData));
                    
                    // Reset lại bộ lọc về "Tất cả" để hiển thị đầy đủ ngay sau khi nạp
                    document.getElementById('gradeFilter').value = 'all';
                    document.getElementById('typeFilter').value = 'all';
                    document.getElementById('lessonFilter').value = 'all';
                    document.getElementById('searchInput').value = '';

                    renderVocab(vocabularyData);
                    updateLessonFilter();
                    alert(`Tải lên dữ liệu thành công! Đã tự động tối ưu hóa và chống trùng kho từ [Khóa ${grade}].`);
                } else {
                    alert("Cấu trúc file JSON không hợp lệ (Phải là một mảng danh sách các từ).");
                }
            } catch (err) {
                alert("Lỗi cấu trúc dữ liệu, vui lòng kiểm tra kỹ định dạng file JSON.");
            }
        };
        reader.readAsText(file);
        inputElement.value = '';
    }

    // Tính năng tự tay xóa từng từ vựng trực tiếp trên giao diện
    function deleteWord(wordName, gradeName) {
        const confirmDelete = confirm(`Thầy/cô có chắc chắn muốn xóa từ "${wordName}" khỏi hệ thống không?`);
        
        if (confirmDelete) {
            // Lọc loại bỏ từ vựng tương ứng khỏi cơ sở dữ liệu nội bộ
            vocabularyData = vocabularyData.filter(item => 
                !(item.word.toLowerCase() === wordName.toLowerCase() && item.grade === gradeName)
            );

            localStorage.setItem('thptVocabulary', JSON.stringify(vocabularyData));
            
            // Re-render cập nhật lại màn hình dựa theo trạng thái bộ lọc hiện tại
            filterData(); 
            updateLessonFilter(); 
        }
    }
</script>
</body>
</html>
