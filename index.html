<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Loại Từ Vựng THPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --sgk-color: #2ecc71;
            --morong-color: #9b59b6;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        /* Thanh tìm kiếm và bộ lọc của Học sinh */
        .filter-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
        }

        .search-box {
            flex: 2;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
        }

        .filter-select select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background-color: white;
            cursor: pointer;
        }

        /* Bảng điều khiển tải lên dành cho Giáo viên */
        .admin-panel {
            background: #edf2f7;
            border: 1px solid #cbd5e0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .admin-panel h3 {
            margin-top: 0;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .upload-zone {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .upload-zone h4 {
            margin: 0 0 10px 0;
            color: #4a5568;
            border-bottom: 2px solid #cbd5e0;
            padding-bottom: 5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        .btn-upload {
            width: 100%;
            padding: 10px 5px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border: 2px dashed;
            background: white;
            transition: all 0.2s;
        }

        .btn-sgk { border-color: var(--sgk-color); color: var(--sgk-color); }
        .btn-sgk:hover { background: var(--sgk-color); color: white; }

        .btn-morong { border-color: var(--morong-color); color: var(--morong-color); }
        .btn-morong:hover { background: var(--morong-color); color: white; }

        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            cursor: pointer; height: 100%; width: 100%;
        }

        /* Danh sách hiển thị từ vựng */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .vocab-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            transition: transform 0.2s;
        }

        .vocab-card:hover { transform: translateY(-5px); }

        .card-tags {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }

        .tag-grade { background-color: var(--primary-color); }
        .tag-sgk { background-color: var(--sgk-color); }
        .tag-morong { background-color: var(--morong-color); }
        .tag-level { background-color: #e74c3c; margin-left: auto;}

        .word-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 5px 0;
        }

        .word-ipa {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 10px;
        }

        .word-meaning {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
            border-left: 3px solid var(--secondary-color);
            padding-left: 8px;
        }

        .word-example {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .word-example span {
            display: block;
            color: #666;
            font-style: italic;
            margin-top: 4px;
        }

        .word-details summary {
            font-size: 14px;
            color: var(--secondary-color);
            cursor: pointer;
            font-weight: bold;
        }

        .details-content {
            margin-top: 10px;
            font-size: 13px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .detail-item { margin-bottom: 8px; }
        .detail-item strong { color: #555; }

        .lesson-badge {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 12px;
        }

        .no-result {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #888;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> Hệ Thống Quản Lý Từ Vựng THPT</h1>
        <p>Phân loại khoa học Lớp 10 - 11 - 12 • Từ vựng SGK & Mở rộng cấp độ B1+</p>
    </header>

    <!-- KHU VỰC DÀNH CHO GIÁO VIÊN: NÚT TẢI LÊN RIÊNG BIỆT -->
    <div class="admin-panel">
        <h3><i class="fa-solid fa-folder-plus"></i> Khu Vực Cập Nhật Từ Vựng (Dành Cho Giáo Viên)</h3>
        <div class="upload-grid">
            <!-- Khối 10 -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-bookmark"></i> Tải lên Lớp 10</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-sgk"><i class="fa-solid fa-book"></i> Từ SGK</button>
                        <input type="file" onchange="importVocab(this, '10', 'SGK')" accept=".json">
                    </div>
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-morong"><i class="fa-solid fa-arrow-up-right-from-square"></i> Mở rộng</button>
                        <input type="file" onchange="importVocab(this, '10', 'Mở rộng')" accept=".json">
                    </div>
                </div>
            </div>
            <!-- Khối 11 -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-bookmark"></i> Tải lên Lớp 11</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-sgk"><i class="fa-solid fa-book"></i> Từ SGK</button>
                        <input type="file" onchange="importVocab(this, '11', 'SGK')" accept=".json">
                    </div>
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-morong"><i class="fa-solid fa-arrow-up-right-from-square"></i> Mở rộng</button>
                        <input type="file" onchange="importVocab(this, '11', 'Mở rộng')" accept=".json">
                    </div>
                </div>
            </div>
            <!-- Khối 12 -->
            <div class="upload-zone">
                <h4><i class="fa-solid fa-bookmark"></i> Tải lên Lớp 12</h4>
                <div class="btn-group">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-sgk"><i class="fa-solid fa-book"></i> Từ SGK</button>
                        <input type="file" onchange="importVocab(this, '12', 'SGK')" accept=".json">
                    </div>
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload btn-morong"><i class="fa-solid fa-arrow-up-right-from-square"></i> Mở rộng</button>
                        <input type="file" onchange="importVocab(this, '12', 'Mở rộng')" accept=".json">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- THANH CÔNG CỤ TÌM KIẾM & BỘ LỌC CỦA HỌC SINH -->
    <div class="filter-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm kiếm từ vựng, ý nghĩa, ví dụ...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="filter-select">
            <select id="gradeFilter">
                <option value="all">Tất cả các lớp</option>
                <option value="10">Lớp 10</option>
                <option value="11">Lớp 11</option>
                <option value="12">Lớp 12</option>
            </select>
        </div>

        <div class="filter-select">
            <select id="typeFilter">
                <option value="all">Tất cả loại từ</option>
                <option value="SGK">Từ vựng SGK</option>
                <option value="Mở rộng">Từ vựng mở rộng</option>
            </select>
        </div>

        <div class="filter-select">
            <select id="lessonFilter">
                <option value="all">Tất cả bài học</option>
            </select>
        </div>
    </div>

    <!-- LƯỚI TỪ VỰNG -->
    <div class="vocab-grid" id="vocabGrid"></div>
</div>

<script>
    // Dữ liệu bộ lõi hệ thống
    let vocabularyData = [];

    document.addEventListener("DOMContentLoaded", () => {
        const localData = localStorage.getItem('thptVocabulary');
        if (localData) {
            vocabularyData = JSON.parse(localData);
        } else {
            // Nạp sẵn vài từ mẫu ban đầu để giao diện không bị trống
            vocabularyData = [
                {
                    "word": "Commute", "level": "B1", "ipa": "/kəˈmjuːt/", "grade": "12", "type": "SGK", "lesson": "Unit 1",
                    "meaning": "Đi làm hằng ngày bằng phương tiện công cộng công sở.",
                    "example_en": "He commutes to work by train every day.", "example_vi": "Anh ấy đi làm bằng tàu hỏa mỗi ngày.",
                    "collocations": "daily commute", "word_family": "commuter (n)", "synonyms": "travel", "antonyms": ""
                }
            ];
        }
        renderVocab(vocabularyData);
        updateLessonFilter();

        // Đăng ký sự kiện lọc tìm kiếm trực tiếp
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('gradeFilter').addEventListener('change', filterData);
        document.getElementById('typeFilter').addEventListener('change', filterData);
        document.getElementById('lessonFilter').addEventListener('change', filterData);
    });

    // Hàm hiển thị danh sách thẻ từ vựng
    function renderVocab(data) {
        const grid = document.getElementById('vocabGrid');
        grid.innerHTML = '';

        if(data.length === 0) {
            grid.innerHTML = `<div class="no-result"><i class="fa-regular fa-face-frown"></i> Không tìm thấy từ vựng nào khớp bộ lọc.</div>`;
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'vocab-card';
            
            // Định dạng kiểu thẻ theo loại từ
            const typeTagClass = item.type === 'SGK' ? 'tag-sgk' : 'tag-morong';

            card.innerHTML = `
                <div class="card-tags">
                    <span class="tag tag-grade">Lớp ${item.grade}</span>
                    <span class="tag ${typeTagClass}">${item.type}</span>
                    <span class="tag tag-level">${item.level || 'B1+'}</span>
                </div>
                <h3 class="word-title">${item.word}</h3>
                <div class="word-ipa">${item.ipa || ''}</div>
                <div class="word-meaning">${item.meaning}</div>
                <div class="word-example">
                    <strong>Ex:</strong> ${item.example_en}
                    <span>${item.example_vi || ''}</span>
                </div>
                <details class="word-details">
                    <summary>Xem mở rộng (Word Map)</summary>
                    <div class="details-content">
                        ${item.collocations ? `<div class="detail-item"><strong>Collocations:</strong> ${item.collocations}</div>` : ''}
                        ${item.word_family ? `<div class="detail-item"><strong>Word Family:</strong> ${item.word_family}</div>` : ''}
                        ${item.synonyms ? `<div class="detail-item"><strong>Synonyms:</strong> ${item.synonyms}</div>` : ''}
                        ${item.antonyms ? `<div class="detail-item"><strong>Antonyms:</strong> ${item.antonyms}</div>` : ''}
                    </div>
                </details>
                <div><span class="lesson-badge"><i class="fa-solid fa-bookmark"></i> ${item.lesson || 'General'}</span></div>
            `;
            grid.appendChild(card);
        });
    }

    // Tự động phân tích danh sách bài học dựa trên dữ liệu đang có
    function updateLessonFilter() {
        const filter = document.getElementById('lessonFilter');
        const lessons = [...new Set(vocabularyData.map(item => item.lesson || 'General'))];
        filter.innerHTML = '<option value="all">Tất cả bài học</option>';
        lessons.forEach(lesson => {
            const option = document.createElement('option');
            option.value = lesson; option.textContent = lesson;
            filter.appendChild(option);
        });
    }

    // Bộ lọc logic đa chức năng
    function filterData() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        const selectedGrade = document.getElementById('gradeFilter').value;
        const selectedType = document.getElementById('typeFilter').value;
        const selectedLesson = document.getElementById('lessonFilter').value;

        const filtered = vocabularyData.filter(item => {
            const matchKeyword = item.word.toLowerCase().includes(keyword) || item.meaning.toLowerCase().includes(keyword);
            const matchGrade = (selectedGrade === 'all') || (item.grade === selectedGrade);
            const matchType = (selectedType === 'all') || (item.type === selectedType);
            const matchLesson = (selectedLesson === 'all') || (item.lesson === selectedLesson);

            return matchKeyword && matchGrade && matchType && matchLesson;
        });

        renderVocab(filtered);
    }

    // HÀM TỰ ĐỘNG IMPORT PHÂN LOẠI THEO TỪNG NÚT BẤM CỦA GIÁO VIÊN
    function importVocab(inputElement, grade, type) {
        const file = inputElement.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const newData = JSON.parse(e.target.result);
                if (Array.isArray(newData)) {
                    newData.forEach(item => {
                        // Gắn thẻ tự động thuộc tính lớp và loại từ dựa theo nút bấm
                        item.grade = grade;
                        item.type = type;

                        // Đồng bộ hóa đè nếu trùng lặp từ vựng
                        const index = vocabularyData.findIndex(v => v.word.toLowerCase() === item.word.toLowerCase() && v.grade === grade);
                        if (index !== -1) {
                            vocabularyData[index] = item;
                        } else {
                            vocabularyData.push(item);
                        }
                    });

                    localStorage.setItem('thptVocabulary', JSON.stringify(vocabularyData));
                    renderVocab(vocabularyData);
                    updateLessonFilter();
                    alert(`Đã tải thành công bộ từ vựng [Lớp ${grade} - Hoạt động: ${type}]. Hệ thống đã cập nhật tổng số từ!`);
                } else {
                    alert("Cấu trúc file JSON chưa chính xác, phải là một danh sách dữ liệu.");
                }
            } catch (err) {
                alert("Không thể đọc được file, vui lòng kiểm tra lại cấu trúc file định dạng JSON.");
            }
        };
        reader.readAsText(file);
        inputElement.value = ''; // Reset input để có thể tải lại cùng một file nếu sửa đổi
    }
</script>
</body>
</html>
